  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gba(34,51,230,0.28);\n    background: rgba(34,51,230,0.055);\n    transform: translateX(-2px);\n  }\n  .case-back:focus-visible {\n    outline: 2px solid rgba(34,51,230,0.35);\n    outline-offset: 3px;\n  }\n  .case-eyebrow {\n    font-size: 12px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 24px;\n    display: flex;\n    align-items: center;\n    gap: 16px;\n  }\n  .case-eyebrow::before { content: ''; width: 48px; height: 1px; background: var(--accent); }\n\n  .case-header h1 {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 600;\n    font-size: clamp(40px, 5vw, 72px);\n    line-height: 1.05;\n    letter-spacing: -0.035em;\n    margin-bottom: 44px;\n    max-width: 22ch;\n  }\n\n  .meta-table {\n    display: grid;\n    grid-template-columns: 200px 1fr;\n    border-top: 1px solid var(--line);\n  }\n  .meta-row { display: contents; }\n  .meta-row .k, .meta-row .v {\n    padding: 14px 0;\n    border-bottom: 1px solid var(--line);\n  }\n  .meta-row .k {\n    font-size: 12px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .meta-row .v { font-size: 15px; }\n  .tag {\n    display: inline-block;\n    padding: 4px 11px;\n    background: var(--bg-soft);\n    color: var(--ink-2);\n    border-radius: 6px;\n    font-size: 13px;\n    margin-right: 6px;\n  }\n\n  /* TOC */\n  .toc {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n    padding: 24px 26px;\n    box-shadow: 0 18px 40px -28px rgba(21,20,15, 0.4);\n  }\n  .toc-label {\n    font-size: 11px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 12px;\n    display: flex;\n    align-items: center;\n    gap: 12px;\n  }\n  .toc-label::before { content: ''; width: 24px; height: 1px; background: var(--accent); }\n  .toc ol { list-style: none; counter-reset: toc; }\n  .toc ol li { counter-increment: toc; border-bottom: 1px solid var(--line-soft); }\n  .toc ol li:last-child { border-bottom: none; }\n  .toc ol li a {\n    display: flex;\n    gap: 14px;\n    padding: 12px 0;\n    font-size: 14px;\n    line-height: 1.4;\n    color: var(--ink);\n    text-decoration: none;\n    transition: color .2s;\n  }\n  .toc ol li a:hover { color: var(--accent); }\n  .toc ol li a::before {\n    content: counter(toc, decimal-leading-zero);\n    font-family: 'Space Grotesk', sans-serif;\n    color: var(--muted);\n    font-size: 13px;\n    flex-shrink: 0;\n    padding-top: 1px;\n  }\n  .toc-footer {\n    margin-top: 16px;\n    padding-top: 16px;\n    border-top: 1px solid var(--line);\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n\n  /* Product intro */\n  .product-intro {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    margin-bottom: 16px;\n  }\n  .product-intro .logo {\n    width: 36px; height: 36px;\n    background: #FF5B2E;\n    border-radius: 8px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    color: #fff;\n    font-size: 18px;\n    font-weight: 700;\n  }\n  .product-intro .name {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 22px;\n    font-weight: 500;\n  }\n  .product-quote {\n    border-left: 2px solid var(--accent);\n    padding: 4px 0 4px 24px;\n    margin: 0 0 48px;\n  }\n  .product-quote p {\n    font-family: 'Hanken Grotesk', sans-serif;\n    font-style: italic;\n    font-size: 19px;\n    line-height: 1.5;\n    color: var(--ink);\n    margin: 0;\n  }\n\n  /* Summary */\n  .summary {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n    padding: 32px 36px;\n    margin-bottom: 32px;\n    display: grid;\n    gap: 22px;\n  }\n  .summary-row {\n    font-size: 16px;\n    line-height: 1.6;\n    color: var(--ink-3);\n  }\n  .summary-row strong {\n    color: var(--ink);\n    font-weight: 600;\n    display: block;\n    margin-bottom: 6px;\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 18px;\n  }\n\n  /* Headings */\n  h2 {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 600;\n    font-size: clamp(32px, 4vw, 54px);\n    line-height: 1.06;\n    letter-spacing: -0.035em;\n    margin: 88px 0 24px;\n    scroll-margin-top: 24px;\n  }\n  h3 {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 500;\n    font-size: 27px;\n    line-height: 1.2;\n    letter-spacing: -0.015em;\n    margin: 44px 0 14px;\n  }\n  h4 {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 500;\n    font-size: 19px;\n    line-height: 1.25;\n    margin: 26px 0 12px;\n  }\n\n  p, li { font-size: 17px; line-height: 1.7; color: var(--ink-3); }\n  p { margin-bottom: 18px; max-width: 70ch; }\n  p strong { color: var(--ink); font-weight: 600; }\n\n  ul.bullets { list-style: none; margin: 16px 0 24px; max-width: 70ch; }\n  ul.bullets li {\n    position: relative;\n    padding: 10px 0 10px 26px;\n    border-bottom: 1px solid var(--line-soft);\n  }\n  ul.bullets li:last-child { border: none; }\n  ul.bullets li::before {\n    content: '';\n    position: absolute;\n    left: 2px; top: 19px;\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: var(--muted);\n    opacity: 0.55;\n  }\n\n  /* Stage card */\n  .stage-card {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n    padding: 28px 30px;\n    margin: 16px 0;\n  }\n  .stage-card .step {\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--accent);\n    font-weight: 600;\n    margin-bottom: 8px;\n  }\n  .stage-card h4 { margin: 0 0 10px; font-size: 21px; }\n  .stage-card p { margin: 0; max-width: none; font-size: 16px; }\n  .stage-card p + p { margin-top: 12px; }\n\n  /* Job stories */\n  .job-story {\n    border-left: 2px solid var(--accent);\n    padding: 6px 0 6px 26px;\n    margin: 20px 0;\n  }\n  .job-story p {\n    font-family: 'Hanken Grotesk', sans-serif;\n    font-style: italic;\n    font-size: 19px;\n    line-height: 1.5;\n    color: var(--ink);\n    margin: 0;\n    max-width: 64ch;\n  }\n\n  /* Hypotheses */\n  .hyp-list { margin: 22px 0; display: grid; gap: 2px; }\n  .hyp-item {\n    display: flex;\n    gap: 16px;\n    align-items: flex-start;\n    padding: 16px 0;\n    border-bottom: 1px solid var(--line-soft);\n  }\n  .hyp-item:last-child { border-bottom: none; }\n  .hyp-item .nx {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 16px;\n    color: var(--accent);\n    flex-shrink: 0;\n    width: 26px;\n    padding-top: 2px;\n  }\n  .hyp-item .tx { font-size: 16px; line-height: 1.55; color: var(--ink-3); }\n\n  /* ============ FIGURE SYSTEM ============ */\n  .figure { margin: 32px 0; cursor: zoom-in; }\n  .figure-frame {\n    position: relative;\n    border-radius: 12px;\n    overflow: hidden;\n    border: 0;\n    background: transparent;\n    box-shadow: none;\n    transition: transform .35s ease;\n  }\n  .figure:hover .figure-frame { transform: translateY(-2px); }\n  .figure-frame img { width: 100%; height: auto; display: block; }\n  .figure-frame.pad { padding: 0; }\n  .figure-frame.pad img { border-radius: 12px; }\n\n  .zoom-badge {\n    position: absolute;\n    top: 14px; right: 14px;\n    display: inline-flex;\n    align-items: center;\n    gap: 7px;\n    padding: 7px 13px;\n    background: rgba(28, 24, 22, 0.74);\n    backdrop-filter: blur(6px);\n    color: #fff;\n    font-size: 12px;\n    letter-spacing: 0.04em;\n    border-radius: 999px;\n    opacity: 0;\n    transform: translateY(-4px);\n    transition: opacity .3s ease, transform .3s ease;\n    pointer-events: none;\n  }\n  .figure:hover .zoom-badge { opacity: 1; transform: translateY(0); }\n  .zoom-badge svg { width: 13px; height: 13px; }\n\n  figcaption {\n    margin-top: 14px;\n    font-size: 13px;\n    line-height: 1.5;\n    color: var(--muted);\n    letter-spacing: 0.01em;\n    display: flex;\n    gap: 12px;\n  }\n  figcaption::before {\n    content: '';\n    flex-shrink: 0;\n    width: 22px; height: 1px;\n    background: var(--muted);\n    margin-top: 10px;\n  }\n\n  .bleed {\n    width: 92vw;\n    max-width: 1500px;\n    margin-left: 50%;\n    transform: translateX(-50%);\n  }\n  .bleed figcaption { padding: 0 4vw; max-width: 1100px; margin-left: auto; margin-right: auto; }\n\n  /* Insights */\n  .insights { display: grid; gap: 14px; margin: 22px 0; }\n  .insight {\n    display: grid;\n    grid-template-columns: 88px 1fr;\n    gap: 24px;\n    align-items: start;\n    padding: 24px 28px;\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n  }\n  .insight .stat {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 30px;\n    line-height: 1;\n    color: var(--accent-deep);\n    font-weight: 600;\n    padding-top: 2px;\n  }\n  .insight .stat small { display: block; font-size: 12px; color: var(--muted); letter-spacing: 0.04em; margin-top: 6px; font-family: 'Hanken Grotesk', sans-serif; }\n  .insight .lead {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 19px;\n    line-height: 1.3;\n    color: var(--ink);\n    margin-bottom: 6px;\n  }\n  .insight .body { font-size: 15px; line-height: 1.6; color: var(--ink-3); }\n\n  /* Callout */\n  .callout {\n    margin: 28px 0;\n    padding: 22px 28px;\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-left: 3px solid var(--accent);\n    border-radius: 0 12px 12px 0;\n    font-size: 16px;\n    line-height: 1.65;\n    color: var(--ink);\n    max-width: 74ch;\n  }\n  .callout p { margin: 0; max-width: none; }\n  .callout strong { color: var(--accent-deep); font-weight: 600; }\n\n  /* Result panel */\n  .result-panel {\n    margin: 28px 0;\n    padding: 36px 40px;\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n    box-shadow: 0 18px 40px -28px rgba(21,20,1 nd: var(--accent);\n    color: white;\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 15px;\n    font-weight: 600;\n  }\n\n  .to-top {\n    position: fixed;\n    right: max(24px, calc((100vw - 1080px) / 2 + 18px));\n    bottom: 24px;\n    width: 42px;\n    height: 42px;\n    border-radius: 999px;\n    border: 1px solid var(--line);\n    background: rgba(241,238,229,0.82);\n    color: var(--ink-2);\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    font: 18px/1 'Space Grotesk', sans-serif;\n    box-shadow: 0 18px 36px -28px rgba(21,20,15,0.48);\n    opacity: 0;\n    pointer-events: none;\n    transform: translateY(8px);\n    transition: opacity .2s, transform .2s, color .2s, border-color .2s, background .2s;\n    z-index: 90;\n  }\n  .to-top.visible {\n    opacity: 1;\n    pointer-events: auto;\n    transform: translateY(0);\n  }\n  .to-top:hover {\n    color: var(--accent-deep);\n    border-color: rgba(34,51,230,0.28);\n    background: rgba(241,238,229,0.95);\n  }\n  .to-top:focus-visible {\n    outline: 2px solid rgba(34,51,230,0.35);\n    outline-offset: 3px;\n  }\n\n  @media (max-width: 960px) {\n    .case-header { grid-template-columns: 1fr; gap: 40px; }\n    .case-header-aside { position: static; padding-top: 0; }\n    .bleed { width: 100%; max-width: none; margin-left: 0; transform: none; }\n    .bleed figcaption { padding: 0; }\n    .result-metrics { grid-template-columns: 1fr; gap: 18px; }\n  }\n  @media (max-width: 760px) {\n    .wrap { padding: 0 24px; }\n    .case-header { padding: 48px 0 32px; }\n    .meta-table { grid-template-columns: 140px 1fr; }\n    .summary, .result-panel { padding: 24px; }\n    .insight { grid-template-columns: 1fr; gap: 10px; }\n    .insight .stat { font-size: 26px; }\n    .result-metrics .m .v { font-size: 34px; }\n    nav.topnav .brand .nm { font-size: 17px; }\n    .next-case { padding: 56px 24px; margin: 80px 0 40px; }\n    .lb-cap { display: none; }\n    footer { flex-direction: column; gap: 8px; text-align: center; }\n  }\n</style>\n</head>\n<body>\n\n<div class=\"wrap\">\n\n  <nav class=\"topnav\">\n    <a class=\"brand\" href=\"../index.html\" aria-label=\"К портфолио Виктории Шаханиной\"><span class=\"mark\">ВШ</span><span class=\"nm\">Виктория Шаханина</span></a>\n    \n  </nav>\n\n  <header class=\"case-header\">\n    <div class=\"case-header-main\">\n      <a href=\"../index.html\" class=\"case-back\">← К портфолио</a>\n      <div class=\"case-eyebrow\">Кейс · Wowworks · iOS</div>\n      <h1>Как мы убрали тревожность из сценария вывода средств</h1>\n\n      <div class=\"meta-table\">\n        <div class=\"meta-row\">\n          <div class=\"k\">Роль</div>\n          <div class=\"v\"><span class=\"tag\">Product Designer</span></div>\n        </div>\n        <div class=\"meta-row\">\n          <div class=\"k\">Мой вклад</div>\n          <div class=\"v\"><span class=\"tag\">Исследование</span><span class=\"tag\">CJM</span><span class=\"tag\">Гипотезы</span><span class=\"tag\">Тестирование</span><span class=\"tag\">UX/UI</span></div>\n        </div>\n        <div class=\"meta-row\">\n          <div class=\"k\">Платформа</div>\n          <div class=\"v\"><span class=\"tag\">iOS</span></div>\n        </div>\n      </div>\n    </div>\n\n    <aside class=\"case-header-aside\">\n      <nav class=\"toc\">\n        <div class=\"toc-label\">Оглавление</div>\n        <ol>\n          <li><a href=\"#project\">Проект</a></li>\n          <li><a href=\"#context\">Контекст</a></li>\n          <li><a href=\"#task\">Задача</a></li>\n          <li><a href=\"#work\">Что я сделала</a></li>\n          <li><a href=\"#changes\">Что изменилось</a></li>\n          <li><a href=\"#solution\">Решение</a></li>\n          <li><a href=\"#result\">Результат</a></li>\n        </ol>\n        <div class=\"toc-footer\">~ 5 минут чтения</div>\n      </nav>\n    </aside>\n  </header>\n\n  <h2 id=\"project\">Проект</h2>\n  <p>Спроектировала вывод средств для исполнителей Wowworks на iOS и помогла закрыть полный финансовый цикл внутри мобильного приложения.</p>\n  <p>Исследование показало, что пользователи неправильно понимают сроки зачисления денег и теряют доверие к сервису. До релиза удалось выявить и исправить эти проблемы.</p>\n  <figure class=\"figure\" style=\"margin: 36px 0 64px;\" data-src=\"../images/wallet-preview.png?v=2\" data-cap=\"Кошелёк Wowworks: вывод средств, способы оплаты и история операций\">\n    <div class=\"figure-frame pad\">\n      <img src=\"../images/wallet-preview.png?v=2\" alt=\"Кошелёк Wowworks — обзор сценария\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"></circle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"></path></svg>Увеличить</span>\n    </div>\n    <figcaption>Финальный сценарий кошелька: история операций, вывод средств и добавление карты.</figcaption>\n  </figure>\n\n  <h2 id=\"context\">Контекст</h2>\n  <p>Wowworks — сервис для исполнителей, которые выполняют заявки по обслуживанию коммерческой недвижимости и получают оплату за работу.</p>\n  <p>На Android уже существовал сценарий вывода средств. На iOS его не было.</p>\n  <p>Чтобы получить деньги, пользователям приходилось:</p>\n  <ul class=\"bullets\">\n    <li>переходить в веб-версию;</li>\n    <li>повторно авторизовываться;</li>\n    <li>разбираться в другом интерфейсе.</li>\n  </ul>\n  <p>Это создавало дополнительное трение и снижало доверие к продукту.</p>\n\n  <h2 id=\"task\">Задача</h2>\n  <p>Спроектировать вывод средств для iOS и обеспечить полный финансовый цикл внутри приложения.</p>\n  <p>При этом было важно не просто перенести существующее решение, а разобраться в проблемах текущего сценария и не повторить их.</p>\n\n  <h2 id=\"work\">Что я сделала</h2>\n\n  <h3><span class=\"marker\"></span>Разобрала существующий опыт пользователей</h3>\n  <p>Начала с построения CJM и анализа Android-версии.</p>\n  <p>Мне было важно понять:</p>\n  <ul class=\"bullets\">\n    <li>какие действия выполняют пользователи;</li>\n    <li>где возникают сложности;</li>\n    <li>какие ошибки уже заложены в существующем решении.</li>\n  </ul>\n  <p>Во время анализа обнаружила важную проблему: деньги зачислялись до 14 дней, но интерфейс создавал ощущение мгновенного перевода.</p>\n  <p>Это могло приводить к ложным ожиданиям и разочарованию пользователей.</p>\n  <figure class=\"figure bleed\" data-src=\"../images/wallet-usm.png?v=2\" data-cap=\"CJM и User Story Mapping: полная карта сценариев приложения\">\n    <div class=\"figure-frame pad\">\n      <img src=\"../images/wallet-usm.png?v=2\" alt=\"User Story Mapping кошелька\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"></circle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"></path></svg>Открыть карту</span>\n    </div>\n    <figcaption>CJM помогла увидеть весь путь исполнителя: от выполненной заявки до ожидания поступления денег.</figcaption>\n  </figure>\n\n  <h3><span class=\"marker\"></span>Сформировала гипотезы</h3>\n  <p>На основе CJM и анализа продукта сформулировала три гипотезы.</p>\n  <div class=\"hyp-list\">\n    <div class=\"hyp-item\"><span class=\"nx\">01</span><span class=\"tx\">Пользователи не замечают информацию о сроках зачисления.</span></div>\n    <div class=\"hyp-item\"><span class=\"nx\">02</span><span class=\"tx\">История операций недостаточно понятна для контроля выплат.</span></div>\n    <div class=\"hyp-item\"><span class=\"nx\">03</span><span class=\"tx\">Зелёная визуальная подача создаёт ощущение мгновенного перевода денег.</span></div>\n  </div>\n\n  <h3><span class=\"marker\"></span>Проверила гипотезы на пользователях</h3>\n  <p>Подготовила прототипы и провела тестирование на 10 пользователях.</p>\n  <p>Результаты подтвердили основные опасения.</p>\n  <div class=\"insights\">\n    <div class=\"insight\">\n      <div class=\"stat\">8/10<small>пользователей</small></div>\n      <div>\n        <div class=\"lead\">Не заметили сроки зачисления</div>\n        <div class=\"body\">Пользователи решили, что деньги приходят сразу, хотя фактический срок зачисления мог занимать до 14 дней.</div>\n      </div>\n    </div>\n    <div class=\"insight\">\n      <div class=\"stat\">5/10<small>пользователей</small></div>\n      <div>\n        <div class=\"lead\">Не поняли выбор номера</div>\n        <div class=\"body\">Пользователи не смогли понять, как выбрать нужный номер для вывода средств.</div>\n      </div>\n    </div>\n  </div>\n\n  <h2 id=\"changes\">Что изменилось после тестирования</h2>\n  <p>На основе результатов исследования:</p>\n  <ul class=\"bullets\">\n    <li>убрала визуальные элементы, создающие ложные ожидания;</li>\n    <li>усилила коммуникацию сроков зачисления;</li>\n    <li>добавила выбор номера для вывода на Qiwi;</li>\n    <li>переработала историю операций и статусы.</li>\n  </ul>\n  <p>Все изменения были внесены до релиза.</p>\n  <figure class=\"figure\" data-src=\"../images/wallet-history.png?v=2\" data-cap=\"История операций: было (Android) → стало (iOS) — понятные статусы и суммы\">\n    <div class=\"figure-frame pad\">\n      <img src=\"../images/wallet-history.png?v=2\" alt=\"История операций\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"></circle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"></path></svg>Увеличить</span>\n    </div>\n    <figcaption>История операций стала инструментом контроля выплат: статусы, суммы и даты считываются быстрее.</figcaption>\n  </figure>\n\n  <h2 id=\"solution\">Решение</h2>\n  <p>Сценарий вывода средств был полностью реализован внутри iOS-приложения.</p>\n  <p>Пользователь может:</p>\n  <ul class=\"bullets\">\n    <li>добавить карту;</li>\n    <li>выбрать способ получения денег;</li>\n    <li>вывести средства;</li>\n    <li>отслеживать статус операции;</li>\n    <li>контролировать историю выплат.</li>\n  </ul>\n  <p>Без перехода в веб-версию и повторной авторизации.</p>\n\n  <h3><span class=\"marker\"></span>Добавление карты</h3>\n  <p>Чтобы вывести деньги, исполнитель добавляет карту и выбирает её как способ получения средств.</p>\n  <figure class=\"figure bleed\" data-src=\"../images/wallet-add-card.png?v=2\" data-cap=\"Добавление карты: кошелёк → способы оплаты → ввод данных → карта добавлена\">\n    <div class=\"figure-frame pad\">\n      <img src=\"../images/wallet-add-card.png?v=2\" alt=\"Флоу добавления карты\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"></circle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"></path></svg>Открыть флоу</span>\n    </div>\n    <figcaption>Флоу добавления карты — от выбора способа оплаты до подтверждения.</figcaption>\n  </figure>\n\n  <h3><span class=\"marker\"></span>Вывод средств</h3>\n  <p>Вывести можно любую сумму в пределах остатка. После операции пользователь видит понятное объяснение сроков зачисления и может перейти к истории операций.</p>\n  <figure class=\"figure bleed\" data-src=\"../images/wallet-withdraw.png?v=2\" data-cap=\"Вывод средств: выбор карты → сумма → ожидание поступления → возврат к способам оплаты\">\n    <div class=\"figure-frame pad\">\n      <img src=\"../images/wallet-withdraw.png?v=2\" alt=\"Флоу вывода средств\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"></circle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"></path></svg>Открыть флоу</span>\n    </div>\n    <figcaption>Флоу вывода: выбор карты → сумма → экран ожидания с понятным сроком зачисления.</figcaption>\n  </figure>\n\n  <h2 id=\"result\">Результат</h2>\n  <ul class=\"accented\">\n    <li>Запущен полный финансовый цикл внутри iOS-приложения.</li>\n    <li>Устранена необходимость перехода в веб-версию.</li>\n    <li>Подтверждены и исправлены 3 продуктовые гипотезы до релиза.</li>\n    <li>Снята проблема неверного восприятия сроков зачисления средств.</li>\n    <li>Улучшена прозрачность финансовых операций для исполнителей.</li>\n  </ul>\n\n  <h3><span class=\"marker\"></span>Что было важно</h3>\n  <div class=\"result-panel\">\n    <p>Главный вывод проекта — пользователи переживают не из-за самого ожидания денег, а из-за неопределённости.</p>\n    <p>Небольшие изменения в коммуникации сроков и статусов позволили снять тревожность ещё до запуска продукта.</p>\n  </div>\n\n  <a class=\"next-case\" href=\"../badminton/index.html\">\n    <div class=\"label\">Следующий кейс</div>\n    <h3>Мобильное приложение<br>для записи на тренировки</h3>\n    <span class=\"next-case-link\">Смотреть кейс →</span>\n  </a>\n  <button class=\"to-top\" type=\"button\" aria-label=\"Вернуться к началу\">↑</button>\n\n  <footer>\n    <div>© 2026 Виктория Шаханина</div>\n    <div>Saint-Petersburg</div>\n  </footer>\n\n</div>\n\n<!-- Image viewer -->\n<script>\n  (function () {\n    var style = document.getElementById('portfolio-lightbox-style');\n    if (!style) {\n      style = document.createElement('style');\n      style.id = 'portfolio-lightbox-style';\n      style.textContent = '.lightbox{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;padding:32px;background:rgba(12,11,8,.82);backdrop-filter:blur(10px);cursor:zoom-out}.lightbox.open{display:flex}.lb-scroll{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:auto}.lb-scroll img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;cursor:zoom-out;border-radius:10px;box-shadow:0 24px 80px rgba(0,0,0,.38)}.lb-bar{position:absolute;top:18px;left:18px;right:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;pointer-events:none}.lb-cap{max-width:min(720px,calc(100vw - 120px));padding:8px 12px;border-radius:999px;background:rgba(241,238,229,.88);color:#15140f;font:500 13px/1.35 Hanken Grotesk,-apple-system,sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lb-actions{display:flex;gap:8px;pointer-events:auto}.lb-btn{border:1px solid rgba(241,238,229,.24);background:rgba(241,238,229,.88);color:#15140f;border-radius:999px;padding:8px 12px;font:600 12px/1 Hanken Grotesk,-apple-system,sans-serif;cursor:pointer}.lb-btn.icon{width:36px;height:36px;padding:0;display:grid;place-items:center}.lb-hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);padding:8px 12px;border-radius:999px;background:rgba(241,238,229,.86);color:#514d45;font:500 12px/1 Hanken Grotesk,-apple-system,sans-serif;pointer-events:none;white-space:nowrap}@media(max-width:760px){.lightbox{padding:14px}.lb-bar{top:10px;left:10px;right:10px}.lb-cap{display:none}.lb-hint{display:none}.lb-scroll img{border-radius:6px}}';\n      document.head.appendChild(style);\n    }\n\n    var lb = document.getElementById('lightbox');\n    if (!lb) {\n      lb = document.createElement('div');\n      lb.className = 'lightbox';\n      lb.id = 'lightbox';\n      lb.setAttribute('aria-hidden', 'true');\n      lb.innerHTML = '<div class=\"lb-bar\"><div class=\"lb-cap\" id=\"lbCap\"></div><div class=\"lb-actions\"><button class=\"lb-btn icon\" id=\"lbClose\" type=\"button\" aria-label=\"Закрыть\"><svg viewBox=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6 6l12 12M18 6L6 18\"></path></svg></button></div></div><div class=\"lb-scroll\" id=\"lbScroll\"><img id=\"lbImg\" alt=\"\"></div><div class=\"lb-hint\">Тап по изображению или свободной области — закрыть</div>';\n      document.body.appendChild(lb);\n    }\n\n    var img = document.getElementById('lbImg');\n    var cap = document.getElementById('lbCap');\n    var closeBtn = document.getElementById('lbClose');\n\n    function close() {\n      lb.classList.remove('open');\n      lb.setAttribute('aria-hidden', 'true');\n      document.body.style.overflow = '';\n      if (img) img.removeAttribute('src');\n    }\n\n    function openFigure(figure) {\n      var inlineImg = figure.querySelector('img');\n      var src = figure.getAttribute('data-src') || (inlineImg ? inlineImg.getAttribute('src') : '');\n      if (!src || !img) return;\n      img.src = new URL(src, window.location.href).href;\n      img.alt = figure.querySelector('img') ? figure.querySelector('img').alt : '';\n      if (cap) cap.textContent = figure.getAttribute('data-cap') || img.alt || '';\n      lb.classList.add('open');\n      lb.setAttribute('aria-hidden', 'false');\n      document.body.style.overflow = 'hidden';\n    }\n\n    document.querySelectorAll('.figure').forEach(function (figure) {\n      figure.setAttribute('role', 'button');\n      figure.setAttribute('tabindex', '0');\n      figure.addEventListener('click', function () { openFigure(figure); });\n      figure.addEventListener('keydown', function (event) {\n        if (event.key === 'Enter' || event.key === ' ') {\n          event.preventDefault();\n          openFigure(figure);\n        }\n      });\n    });\n\n    lb.addEventListener('click', function (event) {\n      if (event.target === lb || event.target === img || event.target.classList.contains('lb-scroll')) close();\n    });\n    if (closeBtn) closeBtn.addEventListener('click', close);\n    document.addEventListener('keydown', function (event) {\n      if (event.key === 'Escape' && lb.classList.contains('open')) close();\n    });\n  })();\n<\/script>\n\n\n\n\n<script>\n  (function () {\n    var btn = document.querySelector('.to-top');\n    if (!btn) return;\n    function sync() { btn.classList.toggle('visible', window.scrollY > 700); }\n    btn.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });\n    window.addEventListener('scroll', sync, { passive: true });\n    sync();\n  })();\n<\/script>\n\n</body></html>"
</script>

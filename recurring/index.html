document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{\n    position: absolute;\n    inset: 0;\n    overflow: auto;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 64px 40px 88px;\n  }\n  .lb-scroll img {\n    max-width: 100%;\n    max-height: 100%;\n    object-fit: contain;\n    border-radius: 6px;\n    box-shadow: 0 40px 100px -40px rgba(0,0,0,0.7);\n    cursor: zoom-in;\n  }\n  .lb-scroll.zoomed { align-items: flex-start; justify-content: flex-start; }\n  .lb-scroll.zoomed img { max-width: none; max-height: none; width: auto; cursor: zoom-out; }\n  .lb-bar {\n    position: absolute;\n    top: 0; left: 0; right: 0;\n    height: 64px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 0 24px;\n    z-index: 2;\n  }\n  .lb-cap {\n    color: rgba(255,255,255,0.78);\n    font-size: 13px;\n    letter-spacing: 0.02em;\n    max-width: 70%;\n    line-height: 1.4;\n  }\n  .lb-actions { display: flex; gap: 10px; align-items: center; }\n  .lb-btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 7px;\n    height: 36px;\n    padding: 0 14px;\n    border-radius: 999px;\n    border: 1px solid rgba(255,255,255,0.22);\n    background: rgba(255,255,255,0.06);\n    color: #fff;\n    font-size: 12px;\n    letter-spacing: 0.04em;\n    font-family: 'Hanken Grotesk', sans-serif;\n    cursor: pointer;\n    transition: background .2s, border-color .2s;\n  }\n  .lb-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.4); }\n  .lb-btn.icon { width: 36px; padding: 0; justify-content: center; }\n  .lb-hint {\n    position: absolute;\n    bottom: 22px; left: 0; right: 0;\n    text-align: center;\n    color: rgba(255,255,255,0.5);\n    font-size: 12px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    pointer-events: none;\n  }\n\n  @media (max-width: 960px) {\n    .case-header { grid-template-columns: 1fr; gap: 40px; }\n    .case-header-aside { position: static; padding-top: 0; }\n    .bleed { width: 100%; max-width: none; margin-left: 0; transform: none; }\n    .bleed figcaption { padding: 0; }\n  }\n  @media (max-width: 760px) {\n    .wrap { padding: 0 24px; }\n    .case-header { padding: 48px 0 32px; }\n    .meta-table { grid-template-columns: 140px 1fr; }\n    .summary { padding: 24px; }\n    .result-panel { padding: 24px; }\n    .result-metric .v { font-size: 38px; }\n    .next-case { padding: 56px 24px; margin: 80px 0 40px; }\n    .lb-cap { display: none; }\n    footer { flex-direction: column; gap: 8px; text-align: center; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n\n  <nav class=\"topnav\">\n    <div class=\"brand\">Виктория Шаханина<\u002Fdiv>\n    <a href=\"../index.html\" class=\"back\">К работам<\u002Fa>\n  <\u002Fnav>\n\n  <header class=\"case-header\">\n    <div class=\"case-header-main\">\n      <a href=\"../index.html\" class=\"case-back\">← На главную<\u002Fa>\n      <div class=\"case-eyebrow\">Кейс · МойОфис Фокус<\u002Fdiv>\n      <h1>Проектирование повторяющихся событий в мобильном календаре<\u002Fh1>\n\n      <div class=\"meta-table\">\n        <div class=\"meta-row\">\n          <div class=\"k\">Инструменты<\u002Fdiv>\n          <div class=\"v\"><span class=\"tag\">Figma<\u002Fspan><span class=\"tag\">Confluence<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta-row\">\n          <div class=\"k\">Продукт<\u002Fdiv>\n          <div class=\"v\"><span class=\"tag\">МойОфис Фокус<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta-row\">\n          <div class=\"k\">Платформа<\u002Fdiv>\n          <div class=\"v\"><span class=\"tag\">iOS<\u002Fspan><span class=\"tag\">Android<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <aside class=\"case-header-aside\">\n      <nav class=\"toc\">\n        <div class=\"toc-label\">Оглавление<\u002Fdiv>\n        <ol>\n          <li><a href=\"#problem\">Проблема<\u002Fa><\u002Fli>\n          <li><a href=\"#solution\">Решение<\u002Fa><\u002Fli>\n          <li><a href=\"#work\">Работа над задачей<\u002Fa><\u002Fli>\n          <li><a href=\"#research\">Исследование<\u002Fa><\u002Fli>\n          <li><a href=\"#ux\">UX и интерфейс<\u002Fa><\u002Fli>\n          <li><a href=\"#result\">Результат<\u002Fa><\u002Fli>\n        <\u002Fol>\n        <div class=\"toc-footer\">~ 7 минут чтения<\u002Fdiv>\n      <\u002Fnav>\n    <\u002Faside>\n  <\u002Fheader>\n\n  <figure class=\"figure\" style=\"margin: 48px 0 64px;\" data-src=\"images/rec-hero.jpg\" data-cap=\"Создание повторяющегося события: от календаря до настройки повтора\">\n    <div class=\"figure-frame\">\n      <img src=\"cf6023a8-4c53-4518-b5e4-05c838daf808\" alt=\"Повторяющиеся события — обзор сценария\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffigure>\n\n  <div class=\"product-intro\">\n    <div class=\"logo\">Ф<\u002Fdiv>\n    <div class=\"name\">МойОфис Фокус<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"product-quote\">\n    <p>Мобильное приложение, включающее в себя календарь и задачи.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"summary\">\n    <div class=\"summary-row\">\n      <strong>Моя роль — продуктовый дизайнер<\u002Fstrong>\n      Самостоятельно провела анализ конкурентов, спроектировала вайрфреймы, организовала и провела коридорное тестирование, на основании результатов выбрала финальное решение и подготовила макеты для разработки.\n    <\u002Fdiv>\n    <div class=\"summary-row\">\n      <strong>Технические ограничения<\u002Fstrong>\n      Приложение написано на фреймворке Qt — это требование заказчиков из госсектора: открытый код обеспечивал безопасность продукта. Из-за этого все компоненты, стили и анимации разработчики писали с нуля — готовые библиотеки использовать было нельзя.\n      <br><br>\n      Каждое решение нужно было детально прорабатывать и описывать, потому что у разработки не было готовых паттернов, на которые можно опереться. Это увеличивало количество вопросов со стороны разработчиков и требовало плотной совместной работы.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2 id=\"problem\">Проблема<\u002Fh2>\n  <a href=\"https://habr.com/ru/companies/ncloudtech/articles/796651/\" class=\"ext-link\" target=\"_blank\">Статья на Хабр<\u002Fa>\n  <p>Заказчик не мог планировать встречи в сторонних сервисах из соображений безопасности, а стандартных настроек повтора не хватало для их нестандартного расписания.<\u002Fp>\n  <p>Параллельно 14 внутренних пользователей сообщили, что из-за отсутствия этой функциональности не используют приложение.<\u002Fp>\n\n  <h2 id=\"solution\">Решение<\u002Fh2>\n  <p>Реализовать события с гибкой настройкой повторений.<\u002Fp>\n  <p>Пользователь получает возможность:<\u002Fp>\n  <ul class=\"bullets\">\n    <li>Задавать дни недели и интервалы повторений;<\u002Fli>\n    <li>Управлять всей цепочкой событий;<\u002Fli>\n    <li>Редактировать как серию целиком, так и отдельные события.<\u002Fli>\n  <\u002Ful>\n  <p>Это закрыло потребность ключевого заказчика, а среди внутренних пользователей количество жалоб на отсутствие функциональности снизилось с 14 до 0.<\u002Fp>\n\n  <h2 id=\"work\">Работа над задачей<\u002Fh2>\n\n  <h3><span class=\"marker\"><\u002Fspan>Job Stories<\u002Fh3>\n  <div class=\"job-story\">\n    <p>Когда мои встречи и задачи повторяются по нестандартному расписанию, я хочу поддерживать актуальный график, чтобы меньше ошибаться в планировании и сохранять ощущение контроля над своим временем.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"job-story\">\n    <p>Когда обстоятельства меняются, я хочу, чтобы мой календарь всегда отражал актуальное расписание, чтобы не пропустить ничего важного и не вводить коллег в заблуждение.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"job-story\">\n    <p>Когда мои планы меняются, я хочу, чтобы коллеги узнали об этом вовремя, чтобы никто не пришёл на встречу, которой уже нет.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3><span class=\"marker\"><\u002Fspan>Сценарии<\u002Fh3>\n  <ul class=\"bullets\">\n    <li>Создание повторяющегося события;<\u002Fli>\n    <li>Редактирование всей цепочки событий;<\u002Fli>\n    <li>Редактирование одного события внутри цепочки;<\u002Fli>\n    <li>Оповещение участников об изменениях;<\u002Fli>\n    <li>Удаление повторяющихся событий.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"marker\"><\u002Fspan>Анализ конкурентов<\u002Fh3>\n  <p>Я провела детальный анализ календарей iOS и Google, выявила ключевые проблемы в каждом решении:<\u002Fp>\n  <figure class=\"figure\" data-src=\"images/rec-competitor-1.jpg\" data-cap=\"Анализ конкурента — нативный календарь iOS\">\n    <div class=\"figure-frame pad\">\n      <img src=\"600ae356-9046-44e7-8f9a-d1f68402562f\" alt=\"Анализ конкурента — iOS\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffigure>\n  <figure class=\"figure\" data-src=\"images/rec-competitor-2.jpg\" data-cap=\"Анализ конкурента — Google Календарь\">\n    <div class=\"figure-frame pad\">\n      <img src=\"f168c48f-2c29-4ad8-b734-db8c874458d9\" alt=\"Анализ конкурента — Google\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffigure>\n\n  <h3><span class=\"marker\"><\u002Fspan>Вайрфреймы<\u002Fh3>\n  <p>Я нарисовала вайрфреймы и обсудила их с владельцем продукта. Он выдвинул гипотезу, что пользователь не сможет установить характер повтора в барабане, так как не поймёт, что его нужно крутить с двух сторон. Мы сошлись на том, что я проведу исследование — и на основании результатов решим, какой компонент использовать.<\u002Fp>\n  <figure class=\"figure\" data-src=\"images/rec-wireframes.jpg\" data-cap=\"Вайрфреймы настройки повтора\">\n    <div class=\"figure-frame pad\">\n      <img src=\"67d8b2bb-17b5-49b8-832d-b5e3a30b1d10\" alt=\"Вайрфреймы повторений\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffigure>\n\n  <h2 id=\"research\">Исследование<\u002Fh2>\n  <p>Вместо прототипа я решила протестировать готовые реализации конкурентов — Google Календарь и нативный календарь iOS. Это быстрее и дешевле, чем делать прототип с нуля.<\u002Fp>\n  <p>В качестве респондентов нашла 7 пользователей Android и 6 пользователей iOS. Каждую группу поделила между исследуемыми компонентами: например, 3 пользователя айфона тестировали Google-календарь, а другие 3 — привычный им календарь iOS.<\u002Fp>\n\n  <div class=\"task-box\">\n    <div class=\"lbl\">Задание<\u002Fdiv>\n    <p>Создать событие, которое будет повторяться каждые 3 месяца.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"hypothesis not\">\n    <div class=\"badge\">Гипотеза не подтвердилась<\u002Fdiv>\n    <p>Пользователи справились с двойным барабаном без затруднений.<\u002Fp>\n  <\u002Fdiv>\n\n  <p>В Google Календаре задать повтор на каждые 3 месяца не смогли 2 пользователя, у остальных 5 возникли сложности. Основная проблема — пользователи не понимали поле ввода с цифрой и не замечали подзаголовок.<\u002Fp>\n  <figure class=\"figure\" data-src=\"images/rec-research.jpg\" data-cap=\"Результаты коридорного тестирования\">\n    <div class=\"figure-frame pad\">\n      <img src=\"7b7a3a61-a46c-4edf-acfa-63a7e2395700\" alt=\"Результаты исследования\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffigure>\n\n  <div class=\"callout\">\n    <p><strong>Решение:<\u002Fstrong> выбрала вариант с барабаном и добавила сверху текст-подсказку со склоняемыми словами — «каждые 2 недели», «каждые 5 месяцев». Это закрыло главную проблему Google Календаря.<\u002Fp>\n  <\u002Fdiv>\n\n  <h2 id=\"ux\">UX и интерфейс<\u002Fh2>\n\n  <figure class=\"figure\" data-src=\"images/rec-warframes.jpg\" data-cap=\"Вайрфреймы — ранняя версия\">\n    <div class=\"figure-frame pad\">\n      <img src=\"2b1db102-5e90-4eaa-afd9-f50af6df14e8\" alt=\"Вайрфреймы\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n    <figcaption>Вайрфреймы — ранняя версия настройки повтора.<\u002Ffigcaption>\n  <\u002Ffigure>\n\n  <figure class=\"figure\" data-src=\"images/rec-final.jpg\" data-cap=\"Итоговое решение настройки повтора\">\n    <div class=\"figure-frame pad\">\n      <img src=\"12252573-67e7-441b-8ede-57c357f79caf\" alt=\"Итоговое решение\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n    <figcaption>Итоговое решение — барабан с текстом-подсказкой.<\u002Ffigcaption>\n  <\u002Ffigure>\n\n  <h3><span class=\"marker\"><\u002Fspan>Создание события со сложным повтором<\u002Fh3>\n  <figure class=\"figure bleed\" data-src=\"images/rec-create.jpg\" data-cap=\"Создание события со сложным повтором: полный флоу экранов\">\n    <div class=\"figure-frame pad\">\n      <img src=\"56a48eb2-3fe8-4f2e-b599-59912258f758\" alt=\"Создание события со сложным повтором\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Открыть флоу<\u002Fspan>\n    <\u002Fdiv>\n    <figcaption>Флоу создания события со сложным повтором — от календаря до сохранения серии.<\u002Ffigcaption>\n  <\u002Ffigure>\n\n  <h4>Ограничения<\u002Fh4>\n  <ul class=\"bullets\">\n    <li>Нельзя создать событие с датой окончания раньше даты начала;<\u002Fli>\n    <li>Нельзя создать событие в прошедшую дату;<\u002Fli>\n    <li>День повтора не совпадает с датой начала — например, повтор каждый вторник, а событие создаётся в среду.<\u002Fli>\n  <\u002Ful>\n\n  <h4>Гибкая настройка повторений<\u002Fh4>\n  <p>В зависимости от выбранного повтора интерфейс настройки меняется.<\u002Fp>\n  <p>Поддерживаемые периоды повтора:<\u002Fp>\n  <ul class=\"bullets\">\n    <li>Каждые N недель (N от 1 до 52), в том числе в указанные дни;<\u002Fli>\n    <li>Каждые N месяцев (N от 1 до 12), в том числе в указанные дни или числа;<\u002Fli>\n    <li>Каждые N лет (N от 1 до 99), в том числе в указанные дни или числа.<\u002Fli>\n  <\u002Ful>\n\n  <h4>Принцип работы<\u002Fh4>\n  <p>Пользователь настраивает повтор через двойной барабан: левый задаёт число периода, правый — единицу (дни, недели, месяцы, годы).<\u002Fp>\n\n  <h4>1. Задать дни повтора или выбрать повтор только в будние дни<\u002Fh4>\n  <figure class=\"figure\" data-src=\"images/rec-period-1.jpg\" data-cap=\"Повтор по дням или только по будням\">\n    <div class=\"figure-frame pad\">\n      <img src=\"889d2ab0-daad-4ee4-9d3b-25a0477de19c\" alt=\"Повтор по дням или будням\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffigure>\n\n  <h4>2. Задать повтор по неделям и выбрать дни недели<\u002Fh4>\n  <figure class=\"figure\" data-src=\"images/rec-period-2.jpg\" data-cap=\"Повтор по неделям с выбором дней недели\">\n    <div class=\"figure-frame pad\">\n      <img src=\"33124634-39b3-438c-bc87-8be584554ae9\" alt=\"Повтор по неделям\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffigure>\n\n  <h4>3. Задать повтор по месяцам в выбранные дни или по дням недели<\u002Fh4>\n  <figure class=\"figure\" data-src=\"images/rec-period-3.jpg\" data-cap=\"Повтор по месяцам — в выбранные числа или по дням недели\">\n    <div class=\"figure-frame pad\">\n      <img src=\"f49a17e8-aecf-45bc-9d71-deeea56b2ad5\" alt=\"Повтор по месяцам\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffigure>\n\n  <h4>4. Задать повтор по годам в выбранные месяцы, по дням или по дням недели<\u002Fh4>\n  <figure class=\"figure\" data-src=\"images/rec-period-4.jpg\" data-cap=\"Повтор по годам — выбор месяцев и дней\">\n    <div class=\"figure-frame pad\">\n      <img src=\"e3de5f9a-de13-4a8a-bfbc-e4ceef167951\" alt=\"Повтор по годам\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Увеличить<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffigure>\n\n  <h3><span class=\"marker\"><\u002Fspan>Редактирование события со сложным повтором<\u002Fh3>\n  <figure class=\"figure bleed\" data-src=\"images/rec-edit.jpg\" data-cap=\"Редактирование повторяющегося события: серия и отдельное событие\">\n    <div class=\"figure-frame pad\">\n      <img src=\"855e4f34-736f-48e6-a53f-fd7d3302ff04\" alt=\"Редактирование повторяющегося события\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Открыть флоу<\u002Fspan>\n    <\u002Fdiv>\n    <figcaption>Флоу редактирования — выбор между изменением всей серии и одного события.<\u002Ffigcaption>\n  <\u002Ffigure>\n\n  <h4>Ограничения<\u002Fh4>\n\n  <p><strong>При редактировании одного события из цепочки<\u002Fstrong><\u002Fp>\n  <ul class=\"bullets\">\n    <li>Событие «отрывается» от цепочки и становится самостоятельным;<\u002Fli>\n    <li>Нельзя перенести его на дату, которая не совпадает с днями повтора;<\u002Fli>\n    <li>Если изменить время — остальные события цепочки не меняются;<\u002Fli>\n    <li>Если удалить — в цепочке образуется «дыра», остальные остаются.<\u002Fli>\n  <\u002Ful>\n\n  <p><strong>При редактировании всей цепочки событий<\u002Fstrong><\u002Fp>\n  <ul class=\"bullets\">\n    <li>Все события, кроме отдельно отредактированных, обновляются по новым настройкам повтора.<\u002Fli>\n  <\u002Ful>\n\n  <h2 id=\"result\">Результат<\u002Fh2>\n  <div class=\"result-panel\">\n    <p>Реализация функциональности сняла один из блокеров для заключения сделки с заказчиком.<\u002Fp>\n    <p>Среди внутренних пользователей количество жалоб на отсутствие функциональности снизилось с 14 до 0.<\u002Fp>\n    <div class=\"result-metric\">\n      <span class=\"v\">14 → 0<\u002Fspan>\n      <span class=\"l\">жалоб на отсутствие функциональности<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"next-case\">\n    <div class=\"label\">Следующий кейс<\u002Fdiv>\n    <h3>Антивирус,<br>не ломающий сценарий<\u002Fh3>\n    <a href=\"../antivirus/index.html\">Смотреть кейс →<\u002Fa>\n  <\u002Fdiv>\n\n  <footer>\n    <div>© 2026 Виктория Шаханина<\u002Fdiv>\n    <div>Saint-Petersburg<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<!-- Lightbox -->\n<div class=\"lightbox\" id=\"lightbox\" aria-hidden=\"true\">\n  <div class=\"lb-bar\">\n    <div class=\"lb-cap\" id=\"lbCap\"><\u002Fdiv>\n    <div class=\"lb-actions\">\n      <button class=\"lb-btn\" id=\"lbZoom\" type=\"button\">100%<\u002Fbutton>\n      <button class=\"lb-btn icon\" id=\"lbClose\" type=\"button\" aria-label=\"Закрыть\">\n        <svg viewBox=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"lb-scroll\" id=\"lbScroll\">\n    <img id=\"lbImg\" alt=\"\">\n  <\u002Fdiv>\n  <div class=\"lb-hint\">Клик по изображению — масштаб · Esc — закрыть<\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  (function () {\n    var lb = document.getElementById('lightbox');\n    var scroll = document.getElementById('lbScroll');\n    var img = document.getElementById('lbImg');\n    var cap = document.getElementById('lbCap');\n    var zoomBtn = document.getElementById('lbZoom');\n    var closeBtn = document.getElementById('lbClose');\n    var zoomed = false;\n\n    function setZoom(on) {\n      zoomed = on;\n      scroll.classList.toggle('zoomed', on);\n      zoomBtn.textContent = on ? 'Вписать' : '100%';\n    }\n    function open(src, caption) {\n      img.src = src;\n      cap.textContent = caption || '';\n      lb.classList.add('open');\n      lb.setAttribute('aria-hidden', 'false');\n      document.body.style.overflow = 'hidden';\n      setZoom(false);\n      scroll.scrollTop = 0; scroll.scrollLeft = 0;\n    }\n    function close() {\n      lb.classList.remove('open');\n      lb.setAttribute('aria-hidden', 'true');\n      document.body.style.overflow = '';\n      img.src = '';\n    }\n\n    document.querySelectorAll('.figure').forEach(function (f) {\n      f.addEventListener('click', function () {\n        open(f.getAttribute('data-src'), f.getAttribute('data-cap'));\n      });\n    });\n\n    img.addEventListener('click', function (e) {\n      e.stopPropagation();\n      if (!zoomed) {\n        setZoom(true);\n        var rect = img.getBoundingClientRect();\n        var rx = (e.clientX - rect.left) / rect.width;\n        var ry = (e.clientY - rect.top) / rect.height;\n        requestAnimationFrame(function () {\n          scroll.scrollLeft = rx * (img.scrollWidth - scroll.clientWidth);\n          scroll.scrollTop = ry * (img.scrollHeight - scroll.clientHeight);\n        });\n      } else {\n        setZoom(false);\n      }\n    });\n    zoomBtn.addEventListener('click', function (e) { e.stopPropagation(); setZoom(!zoomed); });\n    closeBtn.addEventListener('click', function (e) { e.stopPropagation(); close(); });\n    scroll.addEventListener('click', function (e) { if (e.target === scroll) close(); });\n    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });\n  })();\n<\u002Fscript>\n\n\n<script>\n(function(){\n  var map={'../index.html':'home','index.html':'home','../calendar/index.html':'calendar','../recurring/index.html':'recurring','../antivirus/index.html':'antivirus','../mail/index.html':'mail','../badminton/index.html':'badminton'};\n  document.addEventListener('click',function(e){\n    var a=e.target.closest('a'); if(!a) return;\n    var h=a.getAttribute('href')||'';\n    if(map[h]!==undefined){ e.preventDefault(); if(window.parent!==window) window.parent.postMessage({nav:map[h]},'*'); }\n  },true);\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

sition: fixed;\n    top: 0; left: 0; right: 0;\n    height: 1040px;\n    background: radial-gradient(ellipse 54% 58% at 68% 18%, rgba(34,51,230,0.13) 0%, rgba(34,51,230,0.04) 40%, transparent 66%);\n    z-index: -2;\n    pointer-events: none;\n  }\n\n  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 56px; position: relative; z-index: 1; }\n\n  /* Nav */\n  nav.topnav {\n    padding: 30px 0 24px;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    border-bottom: 1px solid var(--line);\n  }\n  nav.topnav .brand {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 18px;\n    font-weight: 500;\n    letter-spacing: -0.01em;\n    color: var(--ink);\n  }\n  nav.topnav .back {\n    font-size: 13px;\n    color: var(--ink-2);\n    text-decoration: none;\n    letter-spacing: 0.02em;\n    transition: color .2s;\n  }\n  nav.topnav .back:hover { color: var(--accent); }\n  nav.topnav .back::before { content: '← '; }\n\n  /* Case header */\n  .case-header {\n    padding: 72px 0 52px;\n    display: grid;\n    grid-template-columns: 7fr 4fr;\n    gap: 80px;\n    align-items: start;\n  }\n  .case-header-main { min-width: 0; }\n  .case-header-aside { padding-top: 30px; position: sticky; top: 32px; }\n\n  .case-back { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 30px; font-size: 13px; letter-spacing: 0.04em; color: var(--ink-2); text-decoration: none; transition: color .2s; }\n  .case-back:hover { color: var(--accent); }\n  .case-eyebrow {\n    font-size: 12px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 24px;\n    display: flex;\n    align-items: center;\n    gap: 16px;\n  }\n  .case-eyebrow::before { content: ''; width: 48px; height: 1px; background: var(--accent); }\n\n  .case-header h1 {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 600;\n    font-size: clamp(40px, 5vw, 72px);\n    line-height: 1.05;\n    letter-spacing: -0.035em;\n    margin-bottom: 44px;\n    max-width: 22ch;\n  }\n\n  .meta-table {\n    display: grid;\n    grid-template-columns: 200px 1fr;\n    border-top: 1px solid var(--line);\n  }\n  .meta-row { display: contents; }\n  .meta-row .k, .meta-row .v {\n    padding: 14px 0;\n    border-bottom: 1px solid var(--line);\n  }\n  .meta-row .k {\n    font-size: 12px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .meta-row .v { font-size: 15px; }\n  .tag {\n    display: inline-block;\n    padding: 4px 11px;\n    background: var(--bg-soft);\n    color: var(--ink-2);\n    border-radius: 6px;\n    font-size: 13px;\n    margin-right: 6px;\n  }\n\n  /* TOC */\n  .toc {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n    padding: 24px 26px;\n    box-shadow: 0 18px 40px -28px rgba(21,20,15, 0.4);\n  }\n  .toc-label {\n    font-size: 11px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 12px;\n    display: flex;\n    align-items: center;\n    gap: 12px;\n  }\n  .toc-label::before { content: ''; width: 24px; height: 1px; background: var(--accent); }\n  .toc ol { list-style: none; counter-reset: toc; }\n  .toc ol li { counter-increment: toc; border-bottom: 1px solid var(--line-soft); }\n  .toc ol li:last-child { border-bottom: none; }\n  .toc ol li a {\n    display: flex;\n    gap: 14px;\n    padding: 12px 0;\n    font-size: 14px;\n    line-height: 1.4;\n    color: var(--ink);\n    text-decoration: none;\n    transition: color .2s;\n  }\n  .toc ol li a:hover { color: var(--accent); }\n  .toc ol li a::before {\n    content: counter(toc, decimal-leading-zero);\n    font-family: 'Space Grotesk', sans-serif;\n    color: var(--muted);\n    font-size: 13px;\n    flex-shrink: 0;\n    padding-top: 1px;\n  }\n  .toc-footer {\n    margin-top: 16px;\n    padding-top: 16px;\n    border-top: 1px solid var(--line);\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n\n  /* Product intro */\n  .product-intro {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    margin-bottom: 16px;\n  }\n  .product-intro .logo {\n    width: 36px; height: 36px;\n    background: #2F6FE4;\n    border-radius: 8px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    color: #fff;\n    font-size: 18px;\n    font-weight: 600;\n  }\n  .product-intro .name {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 22px;\n    font-weight: 500;\n  }\n  .product-quote {\n    border-left: 2px solid var(--accent);\n    padding: 4px 0 4px 24px;\n    margin: 0 0 48px;\n  }\n  .product-quote p {\n    font-family: 'Hanken Grotesk', sans-serif;\n    font-style: italic;\n    font-size: 19px;\n    line-height: 1.5;\n    color: var(--ink);\n    margin: 0;\n  }\n\n  /* Summary */\n  .summary {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n    padding: 32px 36px;\n    margin-bottom: 32px;\n    display: grid;\n    gap: 22px;\n  }\n  .summary-row {\n    font-size: 16px;\n    line-height: 1.6;\n    color: var(--ink-3);\n  }\n  .summary-row strong {\n    color: var(--ink);\n    font-weight: 600;\n    display: block;\n    margin-bottom: 6px;\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 18px;\n  }\n\n  /* Headings */\n  h2 {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 600;\n    font-size: clamp(32px, 4vw, 54px);\n    line-height: 1.06;\n    letter-spacing: -0.035em;\n    margin: 88px 0 24px;\n    scroll-margin-top: 24px;\n  }\n  h3 {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 500;\n    font-size: 27px;\n    line-height: 1.2;\n    letter-spacing: -0.015em;\n    margin: 44px 0 14px;\n  }\n  h4 {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 500;\n    font-size: 19px;\n    line-height: 1.25;\n    margin: 26px 0 12px;\n  }\n\n  p, li { font-size: 17px; line-height: 1.7; color: var(--ink-3); }\n  p { margin-bottom: 18px; max-width: 70ch; }\n  p strong { color: var(--ink); font-weight: 600; }\n\n  ul.bullets { list-style: none; margin: 16px 0 24px; max-width: 70ch; }\n  ul.bullets li {\n    position: relative;\n    padding: 10px 0 10px 26px;\n    border-bottom: 1px solid var(--line-soft);\n  }\n  ul.bullets li:last-child { border: none; }\n  ul.bullets li::before {\n    content: '';\n    position: absolute;\n    left: 2px; top: 19px;\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: var(--muted);\n    opacity: 0.55;\n  }\n\n  /* Two-stage research */\n  .stage-card {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n    padding: 28px 30px;\n    margin: 16px 0;\n  }\n  .stage-card .step {\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--accent);\n    font-weight: 600;\n    margin-bottom: 8px;\n  }\n  .stage-card h4 { margin: 0 0 10px; font-size: 21px; }\n  .stage-card p { margin: 0; max-width: none; font-size: 16px; }\n  .stage-card p + p { margin-top: 12px; }\n\n  /* Hypotheses grid */\n  .hyp-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 16px;\n    margin: 22px 0 8px;\n  }\n  .hyp-col {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n    padding: 22px 22px 8px;\n  }\n  .hyp-col .zone {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 17px;\n    color: var(--ink);\n    margin-bottom: 14px;\n    padding-bottom: 12px;\n    border-bottom: 1px solid var(--line);\n  }\n  .hyp-col ul { list-style: none; }\n  .hyp-col li {\n    font-size: 14px;\n    line-height: 1.5;\n    color: var(--ink-3);\n    padding: 9px 0 9px 16px;\n    position: relative;\n    border-bottom: 1px solid var(--line-soft);\n  }\n  .hyp-col li:last-child { border-bottom: none; }\n  .hyp-col li::before {\n    content: '';\n    position: absolute;\n    left: 0; top: 16px;\n    width: 8px; height: 1px;\n    background: var(--accent);\n  }\n\n  /* ============ FIGURE SYSTEM ============ */\n  .figure { margin: 32px 0; cursor: zoom-in; }\n  .figure-frame {\n    position: relative;\n    border-radius: 12px;\n    overflow: hidden;\n    border: 1px solid var(--line);\n    background: #fff;\n    box-shadow: 0 20px 48px -30px rgba(21,20,15, 0.4);\n    transition: box-shadow .35s ease, transform .35s ease;\n  }\n  .figure:hover .figure-frame {\n    box-shadow: 0 28px 60px -28px rgba(21,20,15, 0.5);\n    transform: translateY(-2px);\n  }\n  .figure-frame img { width: 100%; height: auto; display: block; }\n  .figure-frame.pad { padding: 18px; }\n  .figure-frame.pad img { border-radius: 4px; }\n\n  .zoom-badge {\n    position: absolute;\n    top: 14px; right: 14px;\n    display: inline-flex;\n    align-items: center;\n    gap: 7px;\n    padding: 7px 13px;\n    background: rgba(28, 24, 22, 0.74);\n    backdrop-filter: blur(6px);\n    color: #fff;\n    font-size: 12px;\n    letter-spacing: 0.04em;\n    border-radius: 999px;\n    opacity: 0;\n    transform: translateY(-4px);\n    transition: opacity .3s ease, transform .3s ease;\n    pointer-events: none;\n  }\n  .figure:hover .zoom-badge { opacity: 1; transform: translateY(0); }\n  .zoom-badge svg { width: 13px; height: 13px; }\n\n  figcaption {\n    margin-top: 14px;\n    font-size: 13px;\n    line-height: 1.5;\n    color: var(--muted);\n    letter-spacing: 0.01em;\n    display: flex;\n    gap: 12px;\n  }\n  figcaption::before {\n    content: '';\n    flex-shrink: 0;\n    width: 22px; height: 1px;\n    background: var(--muted);\n    margin-top: 10px;\n  }\n\n  .bleed {\n    width: 92vw;\n    max-width: 1500px;\n    margin-left: 50%;\n    transform: translateX(-50%);\n  }\n  .bleed figcaption { padding: 0 4vw; max-width: 1100px; margin-left: auto; margin-right: auto; }\n\n  /* Criticality legend */\n  .legend {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 12px;\n    margin: 20px 0 4px;\n  }\n  .legend .item {\n    flex: 1 1 240px;\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    padding: 16px 18px;\n    background: var(--card);\n  }\n  .legend .badge {\n    display: inline-block;\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    font-weight: 600;\n    padding: 3px 10px;\n    border-radius: 5px;\n    margin-bottom: 10px;\n  }\n  .legend .badge.low { color: var(--crit-low); background: var(--crit-low-bg); }\n  .legend .badge.mid { color: var(--crit-mid); background: var(--crit-mid-bg); }\n  .legend .badge.high { color: var(--crit-high); background: var(--crit-high-bg); }\n  .legend .item p { font-size: 13.5px; line-height: 1.5; margin: 0; color: var(--ink-3); max-width: none; }\n\n  /* Insights */\n  .insights { display: grid; gap: 14px; margin: 22px 0; }\n  .insight {\n    display: grid;\n    grid-template-columns: 88px 1fr;\n    gap: 24px;\n    align-items: start;\n    padding: 24px 28px;\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n  }\n  .insight .stat {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 30px;\n    line-height: 1;\n    color: var(--accent-deep);\n    font-weight: 600;\n    padding-top: 2px;\n  }\n  .insight .stat small { display: block; font-size: 12px; color: var(--muted); letter-spacing: 0.04em; margin-top: 6px; font-family: 'Hanken Grotesk', sans-serif; }\n  .insight .lead {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 19px;\n    line-height: 1.3;\n    color: var(--ink);\n    margin-bottom: 6px;\n  }\n  .insight .body { font-size: 15px; line-height: 1.6; color: var(--ink-3); }\n\n  /* Result panel */\n  .result-panel {\n    margin: 28px 0;\n    padding: 36px 40px;\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 14px;\n    box-shadow: 0 18px 40px -28px rgba(21,20,15, 0.35);\n  }\n  .result-panel p {\n    margin: 0 0 14px;\n    font-size: 17px;\n    line-height: 1.65;\n    color: var(--ink-3);\n    max-width: 72ch;\n  }\n  .result-panel p:last-of-type { margin-bottom: 0; }\n  .result-metrics {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 24px;\n    margin: 28px 0 6px;\n    padding: 26px 0 4px;\n    border-top: 1px solid var(--line);\n  }\n  .result-metrics .m .v {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 42px;\n    line-height: 1;\n    color: var(--accent-deep);\n    font-weight: 600;\n  }\n  .result-metrics .m .l {\n    font-size: 13px;\n    color: var(--muted);\n    letter-spacing: 0.03em;\n    margin-top: 10px;\n    line-height: 1.4;\n  }\n\n  /* Next case */\n  .next-case {\n    margin: 110px 0 60px;\n    padding: 80px 56px;\n    background: var(--ink);\n    color: var(--bg);\n    border-radius: 24px;\n    text-align: center;\n  }\n  .next-case .label {\n    font-size: 12px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 22px;\n  }\n  .next-case h3 {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 600;\n    font-size: clamp(34px, 4.4vw, 56px);\n    line-height: 1.08;\n    margin: 0 0 30px;\n    color: var(--bg);\n  }\n  .next-case a {\n    display: inline-block;\n    padding: 14px 30px;\n    background: var(--accent);\n    color: #fff;\n    border-radius: 999px;\n    text-decoration: none;\n    font-size: 14px;\n    letter-spacing: 0.02em;\n    transition: background .2s;\n  }\n  .next-case a:hover { background: var(--accent-deep); }\n\n  footer {\n    padding: 40px 0;\n    border-top: 1px solid var(--line);\n    display: flex;\n    justify-content: space-between;\n    font-size: 12px;\n    color: var(--muted);\n    letter-spacing: 0.06em;\n  }\n\n  /* ============ LIGHTBOX ============ */\n  .lightbox { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(20, 17, 15, 0.92); backdrop-filter: blur(4px); }\n  .lightbox.open { display: block; }\n  .lb-scroll {\n    position: absolute; inset: 0; overflow: auto;\n    display: flex; align-items: center; justify-content: center;\n    padding: 64px 40px 88px;\n  }\n  .lb-scroll img {\n    max-width: 100%; max-height: 100%; object-fit: contain;\n    border-radius: 6px; box-shadow: 0 40px 100px -40px rgba(0,0,0,0.7); cursor: zoom-in;\n  }\n  .lb-scroll.zoomed { align-items: flex-start; justify-content: flex-start; }\n  .lb-scroll.zoomed img { max-width: none; max-height: none; width: auto; cursor: zoom-out; }\n  .lb-bar {\n    position: absolute; top: 0; left: 0; right: 0; height: 64px;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 0 24px; z-index: 2;\n  }\n  .lb-cap { color: rgba(255,255,255,0.78); font-size: 13px; letter-spacing: 0.02em; max-width: 70%; line-height: 1.4; }\n  .lb-actions { display: flex; gap: 10px; align-items: center; }\n  .lb-btn {\n    display: inline-flex; align-items: center; gap: 7px;\n    height: 36px; padding: 0 14px; border-radius: 999px;\n    border: 1px solid rgba(255,255,255,0.22); background: rgba(255,255,255,0.06);\n    color: #fff; font-size: 12px; letter-spacing: 0.04em;\n    font-family: 'Hanken Grotesk', sans-serif; cursor: pointer;\n    transition: background .2s, border-color .2s;\n  }\n  .lb-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.4); }\n  .lb-btn.icon { width: 36px; padding: 0; justify-content: center; }\n  .lb-hint {\n    position: absolute; bottom: 22px; left: 0; right: 0; text-align: center;\n    color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 0.08em;\n    text-transform: uppercase; pointer-events: none;\n  }\n\n  @media (max-width: 960px) {\n    .case-header { grid-template-columns: 1fr; gap: 40px; }\n    .case-header-aside { position: static; padding-top: 0; }\n    .bleed { width: 100%; max-width: none; margin-left: 0; transform: none; }\n    .bleed figcaption { padding: 0; }\n    .hyp-grid { grid-template-columns: 1fr; }\n    .result-metrics { grid-template-columns: 1fr; gap: 18px; }\n  }\n  @media (max-width: 760px) {\n    .wrap { padding: 0 24px; }\n    .case-header { padding: 48px 0 32px; }\n    .meta-table { grid-template-columns: 140px 1fr; }\n    .summary, .result-panel { padding: 24px; }\n    .insight { grid-template-columns: 1fr; gap: 10px; }\n    .insight .stat { font-size: 26px; }\n    .next-case { padding: 56px 24px; margin: 80px 0 40px; }\n    .lb-cap { display: none; }\n    footer { flex-direction: column; gap: 8px; text-align: center; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n\n  <nav class=\"topnav\">\n    <div class=\"brand\">Виктория Шаханина<\u002Fdiv>\n    <a href=\"../index.html\" class=\"back\">К работам<\u002Fa>\n  <\u002Fnav>\n\n  <header class=\"case-header\">\n    <div class=\"case-header-main\">\n      <a href=\"../index.html\" class=\"case-back\">← На главную<\u002Fa>\n      <div class=\"case-eyebrow\">Кейс · МойОфис Почта<\u002Fdiv>\n      <h1>Как исследование пользователей определило направления развития мобильной почты<\u002Fh1>\n\n      <div class=\"meta-table\">\n        <div class=\"meta-row\">\n          <div class=\"k\">Роль<\u002Fdiv>\n          <div class=\"v\"><span class=\"tag\">UX-исследователь / дизайнер<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta-row\">\n          <div class=\"k\">Инструменты<\u002Fdiv>\n          <div class=\"v\"><span class=\"tag\">Confluence<\u002Fspan><span class=\"tag\">Telegram<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta-row\">\n          <div class=\"k\">Платформа<\u002Fdiv>\n          <div class=\"v\"><span class=\"tag\">iOS<\u002Fspan><span class=\"tag\">Android<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <aside class=\"case-header-aside\">\n      <nav class=\"toc\">\n        <div class=\"toc-label\">Оглавление<\u002Fdiv>\n        <ol>\n          <li><a href=\"#problem\">Проблема и цель<\u002Fa><\u002Fli>\n          <li><a href=\"#research\">Исследование<\u002Fa><\u002Fli>\n          <li><a href=\"#results\">Результаты тестов<\u002Fa><\u002Fli>\n          <li><a href=\"#problems\">Юзабилити-проблемы<\u002Fa><\u002Fli>\n          <li><a href=\"#insights\">Инсайты<\u002Fa><\u002Fli>\n          <li><a href=\"#result\">Результат<\u002Fa><\u002Fli>\n        <\u002Fol>\n        <div class=\"toc-footer\">~ 6 минут чтения<\u002Fdiv>\n      <\u002Fnav>\n    <\u002Faside>\n  <\u002Fheader>\n\n  <div class=\"product-intro\">\n    <div class=\"logo\">М<\u002Fdiv>\n    <div class=\"name\">МойОфис Почта<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"product-quote\">\n    <p>Мобильное приложение почты, которое распространялось через B2G-контракты — без прямого доступа к пользователям.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"summary\">\n    <div class=\"summary-row\">\n      <strong>Моя роль — UX-исследователь<\u002Fstrong>\n      Я работала дизайнером в другой команде МойОфис. Владелец продукта мобильной почты попросила меня протестировать их приложение — я много занималась UX-исследованиями. Всё исследование я провела самостоятельно: придумала гипотезы, составила план, провела тестирование, проанализировала результаты и презентовала их команде.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2 id=\"problem\">Проблема и цель<\u002Fh2>\n  <p>У команды мобильной почты не было данных о том, как внешние пользователи работают с приложением — продукт распространялся через B2G-контракты, и прямого доступа к пользователям не было. Было непонятно, справляются ли люди с базовыми сценариями и где именно возникают трудности.<\u002Fp>\n\n  <h4>Цель исследования<\u002Fh4>\n  <ul class=\"bullets\">\n    <li>Выявить проблемные места в ключевых пользовательских сценариях;<\u002Fli>\n    <li>Проверить, насколько интерфейс понятен без подсказок;<\u002Fli>\n    <li>Оценить, как пользователи взаимодействуют с основными функциями;<\u002Fli>\n    <li>Собрать качественные инсайты для улучшения продукта.<\u002Fli>\n  <\u002Ful>\n\n  <h2 id=\"research\">Исследование<\u002Fh2>\n  <p>Исследование состояло из двух этапов — от количественной приоритизации к качественной проверке.<\u002Fp>\n\n  <div class=\"stage-card\">\n    <div class=\"step\">Этап 1<\u002Fdiv>\n    <h4>Опрос внутренних пользователей<\u002Fh4>\n    <p>Чтобы не тестировать всё подряд, сначала я провела опрос среди внутренних пользователей МойОфис. Цель — выяснить, какие сценарии люди используют чаще всего и с какими проблемами уже сталкиваются. На основе этих данных я выбрала сценарии для тестирования и сформулировала гипотезы.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"stage-card\">\n    <div class=\"step\">Этап 2<\u002Fdiv>\n    <h4>Модерируемое юзабилити-тестирование<\u002Fh4>\n    <p>Протестировала приложение на 10 внешних респондентах — людях, которые активно используют мобильную почту в работе. Тестирование проводилось удалённо через Telegram: респонденты устанавливали тестовую сборку, шарили экран и выполняли задания, комментируя вслух всё, что делают.<\u002Fp>\n    <p>Тестовые данные — письма, папки, контакты — команда тестировщиков подготовила заранее, чтобы все участники работали в одинаковых условиях.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3>Гипотезы<\u002Fh3>\n  <p>Гипотезы я сформулировала по результатам опроса. Они покрывали три зоны интерфейса.<\u002Fp>\n  <div class=\"hyp-grid\">\n    <div class=\"hyp-col\">\n      <div class=\"zone\">Действия с папками<\u002Fdiv>\n      <ul>\n        <li>Непонятно, как создать папку;<\u002Fli>\n        <li>Очистку папки будут искать через лонгтап по папке.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"hyp-col\">\n      <div class=\"zone\">Список писем<\u002Fdiv>\n      <ul>\n        <li>Не смогут найти письмо через поиск, не поймут иконку поиска;<\u002Fli>\n        <li>Непонятно, как пометить письмо важным и снять пометку;<\u002Fli>\n        <li>Непонятно, как отметить прочитанным / непрочитанным;<\u002Fli>\n        <li>Не поймут, как переместить письмо по папкам;<\u002Fli>\n        <li>Непонятна иконка выделения всех писем.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"hyp-col\">\n      <div class=\"zone\">Открытое письмо<\u002Fdiv>\n      <ul>\n        <li>Сложно скопировать информацию из письма;<\u002Fli>\n        <li>Непонятны иконки нижнего бара без подписей;<\u002Fli>\n        <li>Флажок «важное» будут искать внизу;<\u002Fli>\n        <li>Будут копировать адрес, чтобы найти контакт;<\u002Fli>\n        <li>Непонятно, что можно ответить всем.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2 id=\"results\">Результаты тестов<\u002Fh2>\n  <p>Каждое задание я зафиксировала по всем 10 респондентам: справился, не справился или задал уточняющий вопрос. Так стало видно, где проблемы массовые, а где единичные.<\u002Fp>\n  <figure class=\"figure bleed\" data-src=\"images/results.jpg\" data-cap=\"Сводная таблица: 10 респондентов × задания. Зелёный — справился, красный — не справился, серый — вопрос\">\n    <div class=\"figure-frame pad\">\n      <img src=\"8a401526-83d0-4ee2-8076-170eec8c994c\" alt=\"Сводная таблица результатов юзабилити-тестирования\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Открыть таблицу<\u002Fspan>\n    <\u002Fdiv>\n    <figcaption>Сводная таблица результатов по 10 респондентам. Нажмите, чтобы рассмотреть каждое задание.<\u002Ffigcaption>\n  <\u002Ffigure>\n\n  <h2 id=\"problems\">Юзабилити-проблемы<\u002Fh2>\n  <p>Все находки я свела в таблицу и разделила по уровню критичности.<\u002Fp>\n  <div class=\"legend\">\n    <div class=\"item\">\n      <span class=\"badge low\">Низкая<\u002Fspan>\n      <p>Респондент столкнулся с небольшими затруднениями, но справился сам, не потратив много времени и усилий.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"item\">\n      <span class=\"badge mid\">Средняя<\u002Fspan>\n      <p>Более серьёзные затруднения: потратил значительное время и усилия, удовлетворённость снизилась.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"item\">\n      <span class=\"badge high\">Высокая<\u002Fspan>\n      <p>Не смог справиться сам — потребовалась подсказка модератора, либо отказался, либо выполнил неверно.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <figure class=\"figure bleed\" data-src=\"images/problems.jpg\" data-cap=\"Реестр юзабилити-проблем: описание, наблюдения, критичность, частотность и задание, где встретилось\">\n    <div class=\"figure-frame pad\">\n      <img src=\"f9b85b2e-46a6-4494-8669-6ede3aa3da58\" alt=\"Таблица юзабилити-проблем по критичности\">\n      <span class=\"zoom-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4M11 8v6M8 11h6\"><\u002Fpath><\u002Fsvg>Открыть реестр<\u002Fspan>\n    <\u002Fdiv>\n    <figcaption>Реестр проблем: наблюдения, критичность, частотность и привязка к заданию. Нажмите, чтобы рассмотреть.<\u002Ffigcaption>\n  <\u002Ffigure>\n\n  <h2 id=\"insights\">Инсайты<\u002Fh2>\n  <div class=\"insights\">\n    <div class=\"insight\">\n      <div class=\"stat\">6/10<small>пытались<\u002Fsmall><\u002Fdiv>\n      <div>\n        <div class=\"lead\">Пользователи ждали лонгтап там, где его не было<\u002Fdiv>\n        <div class=\"body\">6 из 10 пытались управлять папками через долгое нажатие — привычный паттерн из других приложений, которого в почте не было. Проблема всплыла в трёх разных сценариях.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"insight\">\n      <div class=\"stat\">9/10<small>пытались<\u002Fsmall><\u002Fdiv>\n      <div>\n        <div class=\"lead\">Свайпы — базовое ожидание мобильного пользователя<\u002Fdiv>\n        <div class=\"body\">9 из 10 пытались свайпать экран: закрыть дровер, вернуться назад из письма. Отсутствие этих жестов вызывало растерянность и раздражение.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"insight\">\n      <div class=\"stat\">×3<small>иконки<\u002Fsmall><\u002Fdiv>\n      <div>\n        <div class=\"lead\">Иконки без подписей не считываются<\u002Fdiv>\n        <div class=\"body\">Пользователи не понимали иконку спама (думали — информация), пересылки (путали с ответом), прочитанного / непрочитанного. Это привело к ошибочным действиям.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"insight\">\n      <div class=\"stat\">5/10<small>не нашли<\u002Fsmall><\u002Fdiv>\n      <div>\n        <div class=\"lead\">Поиск работал не так, как ожидали<\u002Fdiv>\n        <div class=\"body\">Пользователи вводили «Иванова Мария», а поиск искал только по «Мария Иванова». 5 из 10 не смогли найти письма с первого раза.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2 id=\"result\">Результат<\u002Fh2>\n  <div class=\"result-panel\">\n    <p>В ходе исследования я выявила <strong>15 UX-проблем<\u002Fstrong>, из которых 3 — критические. Оформила рекомендации и презентовала их команде; 7 историй ушли в бэклог.<\u002Fp>\n    <p>Разработку существующего приложения решили приостановить и сделать новое — <strong>Мэйлион<\u002Fstrong>, которое объединило почту и календарь. Результаты этого исследования легли в основу нового приложения и помогли не повторить старых ошибок.<\u002Fp>\n    <div class=\"result-metrics\">\n      <div class=\"m\"><div class=\"v\">15<\u002Fdiv><div class=\"l\">UX-проблем выявлено<\u002Fdiv><\u002Fdiv>\n      <div class=\"m\"><div class=\"v\">3<\u002Fdiv><div class=\"l\">из них критические<\u002Fdiv><\u002Fdiv>\n      <div class=\"m\"><div class=\"v\">7<\u002Fdiv><div class=\"l\">историй ушло в бэклог<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"next-case\">\n    <div class=\"label\">Следующий кейс<\u002Fdiv>\n    <h3>Вывод средств<br>для исполнителей<\u002Fh3>\n    <a href=\"../wallet/index.html\">Смотреть кейс →<\u002Fa>\n  <\u002Fdiv>\n\n  <footer>\n    <div>© 2026 Виктория Шаханина<\u002Fdiv>\n    <div>Saint-Petersburg<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<!-- Lightbox -->\n<div class=\"lightbox\" id=\"lightbox\" aria-hidden=\"true\">\n  <div class=\"lb-bar\">\n    <div class=\"lb-cap\" id=\"lbCap\"><\u002Fdiv>\n    <div class=\"lb-actions\">\n      <button class=\"lb-btn\" id=\"lbZoom\" type=\"button\">100%<\u002Fbutton>\n      <button class=\"lb-btn icon\" id=\"lbClose\" type=\"button\" aria-label=\"Закрыть\">\n        <svg viewBox=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"lb-scroll\" id=\"lbScroll\">\n    <img id=\"lbImg\" alt=\"\">\n  <\u002Fdiv>\n  <div class=\"lb-hint\">Клик по изображению — масштаб · Esc — закрыть<\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  (function () {\n    var lb = document.getElementById('lightbox');\n    var scroll = document.getElementById('lbScroll');\n    var img = document.getElementById('lbImg');\n    var cap = document.getElementById('lbCap');\n    var zoomBtn = document.getElementById('lbZoom');\n    var closeBtn = document.getElementById('lbClose');\n    var zoomed = false;\n\n    function setZoom(on) {\n      zoomed = on;\n      scroll.classList.toggle('zoomed', on);\n      zoomBtn.textContent = on ? 'Вписать' : '100%';\n    }\n    function open(src, caption) {\n      img.src = src;\n      cap.textContent = caption || '';\n      lb.classList.add('open');\n      lb.setAttribute('aria-hidden', 'false');\n      document.body.style.overflow = 'hidden';\n      setZoom(false);\n      scroll.scrollTop = 0; scroll.scrollLeft = 0;\n    }\n    function close() {\n      lb.classList.remove('open');\n      lb.setAttribute('aria-hidden', 'true');\n      document.body.style.overflow = '';\n      img.removeAttribute('src');\n    }\n\n    document.querySelectorAll('.figure').forEach(function (f) {\n      f.addEventListener('click', function () {\n        open(f.getAttribute('data-src'), f.getAttribute('data-cap'));\n      });\n    });\n\n    img.addEventListener('click', function (e) {\n      e.stopPropagation();\n      if (!zoomed) {\n        setZoom(true);\n        var rect = img.getBoundingClientRect();\n        var rx = (e.clientX - rect.left) / rect.width;\n        var ry = (e.clientY - rect.top) / rect.height;\n        requestAnimationFrame(function () {\n          scroll.scrollLeft = rx * (img.scrollWidth - scroll.clientWidth);\n          scroll.scrollTop = ry * (img.scrollHeight - scroll.clientHeight);\n        });\n      } else {\n        setZoom(false);\n      }\n    });\n    zoomBtn.addEventListener('click', function (e) { e.stopPropagation(); setZoom(!zoomed); });\n    closeBtn.addEventListener('click', function (e) { e.stopPropagation(); close(); });\n    scroll.addEventListener('click', function (e) { if (e.target === scroll) close(); });\n    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });\n  })();\n<\u002Fscript>\n\n\n<script>\n(function(){\n  var map={'../index.html':'home','index.html':'home','../calendar/index.html':'calendar','../recurring/index.html':'recurring','../antivirus/index.html':'antivirus','../mail/index.html':'mail','../badminton/index.html':'badminton'};\n  document.addEventListener('click',function(e){\n    var a=e.target.closest('a'); if(!a) return;\n    var h=a.getAttribute('href')||'';\n    if(map[h]!==undefined){ e.preventDefault(); if(window.parent!==window) window.parent.postMessage({nav:map[h]},'*'); }\n  },true);\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
